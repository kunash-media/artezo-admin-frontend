<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png">
    <title>Contact Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .contact-card {
            transition: all 0.2s ease;
        }
        .contact-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #D89F34;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .skeleton-text {
            height: 1rem;
            border-radius: 0.25rem;
            margin-bottom: 0.5rem;
        }
        .skeleton-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
        .content-hidden {
            display: none !important;
        }
        .content-visible {
            display: block !important;
        }
        .message-content {
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-line;
        }
        .message-row {
            transition: background-color 0.2s ease;
        }
        .message-row:hover {
            background-color: #F8F8EA;
        }
    </style>
</head>
<body class="bg-[#F2F2E8]">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar container -->
        <div id="sidebar-container"></div>

        <!-- Main Content Area -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Header container -->
            <div id="header-container"></div>

            <!-- Contact Management Content -->
            <main class="flex-1 overflow-y-auto p-6">
                <!-- Skeleton Loading -->
                <div id="skeletonLoader" class="content-visible">
                    <!-- Filters Skeleton -->
                    <div class="bg-white p-4 rounded-lg shadow-sm mb-6">
                        <div class="flex gap-4">
                            <div class="skeleton skeleton-text w-96 h-10"></div>
                        </div>
                    </div>
                    <!-- Table Skeleton -->
                    <div class="bg-white rounded-lg shadow-sm overflow-hidden">
                        <div class="p-4 space-y-4">
                            <div class="flex items-center gap-3">
                                <div class="skeleton skeleton-avatar"></div>
                                <div class="flex-1">
                                    <div class="skeleton skeleton-text w-48 mb-2"></div>
                                    <div class="skeleton skeleton-text w-64"></div>
                                </div>
                            </div>
                            <div class="skeleton skeleton-text w-full h-20"></div>
                        </div>
                    </div>
                </div>

                <!-- Actual Content -->
                <div id="actualContent" class="content-hidden">
                    <!-- Page Header -->
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                        <div>
                            <div class="flex items-center gap-3">
                                <h1 class="text-2xl font-semibold" style="color: #133F53;">Contact Management</h1>
                                <span id="totalCountBadge" class="px-3 py-1 rounded-lg text-sm font-semibold" style="background-color: #F8F8EA; color: #133F53; border: 1px solid #D89F34;">0</span>
                            </div>
                            <p class="text-sm mt-0.5" style="color: #957A54;">Manage customers enquiries form.</p>
                        </div>
                    
                        <div class="flex gap-2">
                            <button class="px-4 py-2 rounded-lg text-sm flex items-center gap-2 border"
                                style="border-color: #D89F34; color: #133F53;" onclick="exportContacts()">
                                <i class="fa-solid fa-download"></i>
                                Export
                            </button>
                        </div>
                    </div>

                    <!-- Search Bar -->
                    <div class="bg-white p-4 rounded-lg border border-gray-400 shadow-sm mb-6">
                        <div class="relative w-full lg:w-96">
                            <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-sm"></i>
                            <input type="text" id="searchContact" placeholder="Search by name, email, or message..."
                                class="w-full pl-10 pr-10 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-1 focus:ring-[#D89F34] text-sm"
                                onkeyup="debounceSearch()">
                            <div id="searchLoading" class="absolute right-3 top-1/2 transform -translate-y-1/2 hidden">
                                <i class="fa-solid fa-circle-notch fa-spin text-[#D89F34]"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Messages Table -->
                    <div class="bg-white border border-gray-400 rounded-lg shadow-sm overflow-hidden">
                        <div class="overflow-auto h-[350px]">
                            <table class="w-full">
                                <thead class="sticky top-0">
                                    <tr class="border-b border-gray-200" style="background-color: #F8F8EA;">
                                        <th class="text-left py-3 px-4 text-xs font-semibold" style="color: #133F53;">CONTACT</th>
                                        <th class="text-left py-3 px-4 text-xs font-semibold" style="color: #133F53;">PHONE</th>
                                        <th class="text-left py-3 px-4 text-xs font-semibold" style="color: #133F53;">MESSAGE</th>
                                        <th class="text-left py-3 px-4 text-xs font-semibold" style="color: #133F53;">ACTIONS</th>
                                    </tr>
                                </thead>
                                <tbody id="messagesTableBody">
                                    <!-- Messages loaded dynamically -->
                                </tbody>
                            </table>
                        </div>

                        <!-- Pagination -->
                        <div class="px-4 py-3 border-t border-gray-200 flex flex-col sm:flex-row justify-between items-center gap-3">
                            <p class="text-sm" style="color: #957A54;" id="showingInfo">Showing 0 messages</p>
                            <div class="flex gap-2" id="paginationContainer"></div>
                        </div>
                    </div>

                    <!-- Bulk Actions -->
                    <div id="bulkActions" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-white rounded-lg shadow-lg p-3 hidden" style="z-index: 40;">
                        <div class="flex items-center gap-4">
                            <span class="text-sm font-medium" id="selectedCount" style="color: #133F53;">0 selected</span>
                            <button class="px-3 py-1 bg-red-600 text-white rounded-lg text-sm" onclick="bulkDelete()">
                                <i class="fa-regular fa-trash-can"></i> Delete
                            </button>
                            <button class="px-3 py-1 border border-gray-200 rounded-lg text-sm" onclick="clearSelection()">
                                Cancel
                            </button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modals Container -->
    <div id="modals-container"></div>

    <!-- View Message Modal -->
    <div id="viewMessageModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl p-6 max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold" style="color: #133F53;">Message Details</h3>
                <button onclick="closeViewMessageModal()" class="text-gray-500 hover:text-gray-700">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            <div id="messageDetails" class="space-y-4"></div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl p-6 max-w-sm w-full mx-4">
            <div class="text-center">
                <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-trash-can text-2xl text-red-600"></i>
                </div>
                <h3 class="text-xl font-bold mb-2" style="color: #133F53;">Delete Message</h3>
                <p class="text-sm mb-6" style="color: #957A54;">Are you sure you want to delete this message? This action cannot be undone.</p>
                <div class="flex gap-3">
                    <button onclick="closeDeleteModal()" class="flex-1 py-2 px-4 border border-gray-300 rounded-lg hover:bg-gray-50">Cancel</button>
                    <button onclick="confirmDelete()" class="flex-1 py-2 px-4 bg-red-600 text-white rounded-lg hover:bg-red-700">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div id="notification" class="fixed top-4 right-4 px-4 py-2 rounded-lg shadow-lg z-50 hidden" style="min-width: 250px;">
        <div class="flex items-center gap-2">
            <i id="notificationIcon" class=""></i>
            <span id="notificationMessage" class="text-sm"></span>
        </div>
    </div>

    <script src="/js/order-badge.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/components.js"></script>

    <script>
        const API_BASE = 'http://localhost:8085/api/contact';
        const ITEMS_PER_PAGE = 10;

        let currentPage = 0;
        let totalPages = 0;
        let totalElements = 0;
        let allContacts = [];       // holds full loaded page from API
        let filteredContacts = [];  // after client-side search
        let deleteId = null;
        let searchTimeout = null;
        const DEBOUNCE_MIN_CHARS = 3;

        // ==================== PAGE LOAD ====================
        document.addEventListener('DOMContentLoaded', function () {
            loadData(0);
        });

        async function loadData(page) {
            showSkeleton(true);
            try {
                const res = await fetch(`${API_BASE}/get-all-contact-us?page=${page}&size=${ITEMS_PER_PAGE}&sortBy=formId&sortDir=desc`);
                if (!res.ok) throw new Error('Failed to fetch contacts');
                const data = await res.json();

                allContacts = data.content || [];
                filteredContacts = [...allContacts];
                currentPage = data.page.number;
                totalPages = data.page.totalPages;
                totalElements = data.page.totalElements;

                document.getElementById('totalCountBadge').textContent ="total enquiries : "+ totalElements;

                renderMessages();
                showSkeleton(false);
            } catch (err) {
                console.error(err);
                showNotification('Error loading contacts', 'error');
                showSkeleton(false);
            }
        }

        function showSkeleton(show) {
            const skeleton = document.getElementById('skeletonLoader');
            const content = document.getElementById('actualContent');
            if (show) {
                skeleton.classList.remove('content-hidden');
                skeleton.classList.add('content-visible');
                content.classList.remove('content-visible');
                content.classList.add('content-hidden');
            } else {
                skeleton.classList.remove('content-visible');
                skeleton.classList.add('content-hidden');
                content.classList.remove('content-hidden');
                content.classList.add('content-visible');
            }
        }

        function renderMessages() {
            const tbody = document.getElementById('messagesTableBody');
            if (!tbody) return;

            if (filteredContacts.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4" class="py-12 text-center text-sm" style="color: #957A54;">
                            <i class="fa-regular fa-envelope-open text-3xl mb-3 block" style="color: #D89F34;"></i>
                            No messages found
                        </td>
                    </tr>`;
                document.getElementById('showingInfo').textContent = 'No messages found';
                document.getElementById('paginationContainer').innerHTML = '';
                return;
            }

            document.getElementById('showingInfo').textContent =
                `Showing ${currentPage * ITEMS_PER_PAGE + 1}–${Math.min((currentPage + 1) * ITEMS_PER_PAGE, totalElements)} of ${totalElements} messages`;

            tbody.innerHTML = '';
            filteredContacts.forEach(msg => {
                const initials = msg.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                const row = document.createElement('tr');
                row.className = 'border-b border-gray-100 message-row';
                row.innerHTML = `
                    <td class="py-3 px-4">
                        <div class="flex items-center gap-3">
                            <div class="avatar">${initials}</div>
                            <div>
                                <p class="text-sm font-medium" style="color: #133F53;">${escapeHtml(msg.name)}</p>
                                <p class="text-xs" style="color: #957A54;">${escapeHtml(msg.email)}</p>
                            </div>
                        </div>
                    </td>
                    <td class="py-3 px-4 text-sm" style="color: #957A54;">${escapeHtml(msg.phone || '—')}</td>
                    <td class="py-3 px-4">
                        <p class="text-xs truncate" style="color: #957A54; max-width: 260px;">${escapeHtml(msg.message.substring(0, 60))}${msg.message.length > 60 ? '...' : ''}</p>
                    </td>
                    <td class="py-3 px-4">
                        <div class="flex gap-2">
                            <button onclick="viewMessage(${msg.formId})" class="text-[#957A54] hover:text-[#133F53]" title="View">
                                <i class="fa-regular fa-eye"></i>
                            </button>
                            <button onclick="openDeleteModal(${msg.formId})" class="text-[#957A54] hover:text-red-600" title="Delete">
                                <i class="fa-regular fa-trash-can"></i>
                            </button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });

            renderPagination();
        }

        function renderPagination() {
            const container = document.getElementById('paginationContainer');
            container.innerHTML = '';

            if (totalPages <= 1) return;

            // Prev button
            const prevBtn = document.createElement('button');
            prevBtn.className = 'w-8 h-8 rounded border border-gray-200 hover:bg-[#F8F8EA] disabled:opacity-40';
            prevBtn.disabled = currentPage === 0;
            prevBtn.innerHTML = '<i class="fa-solid fa-chevron-left text-xs"></i>';
            prevBtn.onclick = () => loadData(currentPage - 1);
            container.appendChild(prevBtn);

            // Page buttons — show up to 5 pages around current
            const maxVisible = 5;
            let startPage = Math.max(0, currentPage - Math.floor(maxVisible / 2));
            let endPage = Math.min(totalPages - 1, startPage + maxVisible - 1);
            if (endPage - startPage < maxVisible - 1) {
                startPage = Math.max(0, endPage - maxVisible + 1);
            }

            for (let i = startPage; i <= endPage; i++) {
                const btn = document.createElement('button');
                btn.className = i === currentPage
                    ? 'w-8 h-8 rounded bg-[#133F53] text-white text-sm'
                    : 'w-8 h-8 rounded border border-gray-200 hover:bg-[#F8F8EA] text-sm';
                btn.textContent = i + 1;
                const pageNum = i;
                btn.onclick = () => loadData(pageNum);
                container.appendChild(btn);
            }

            // Next button
            const nextBtn = document.createElement('button');
            nextBtn.className = 'w-8 h-8 rounded border border-gray-200 hover:bg-[#F8F8EA] disabled:opacity-40';
            nextBtn.disabled = currentPage >= totalPages - 1;
            nextBtn.innerHTML = '<i class="fa-solid fa-chevron-right text-xs"></i>';
            nextBtn.onclick = () => loadData(currentPage + 1);
            container.appendChild(nextBtn);
        }

        // ==================== SEARCH (client-side on loaded page, min 3 chars) ====================
        function debounceSearch() {
            const loadingIndicator = document.getElementById('searchLoading');
            const term = document.getElementById('searchContact').value;

            if (searchTimeout) clearTimeout(searchTimeout);

            if (term.length > 0 && term.length < DEBOUNCE_MIN_CHARS) return; // wait for 3 chars

            if (term.length === 0) {
                // Reset immediately
                loadingIndicator.classList.add('hidden');
                filteredContacts = [...allContacts];
                renderMessages();
                return;
            }

            loadingIndicator.classList.remove('hidden');
            searchTimeout = setTimeout(() => {
                loadingIndicator.classList.add('hidden');
                performSearch(term);
            }, 500);
        }

        function performSearch(term) {
            const lower = term.toLowerCase();
            filteredContacts = allContacts.filter(msg =>
                msg.name.toLowerCase().includes(lower) ||
                msg.email.toLowerCase().includes(lower) ||
                msg.message.toLowerCase().includes(lower)
            );
            renderMessages();
        }

        // ==================== VIEW MESSAGE ====================
        async function viewMessage(formId) {
            try {
                const res = await fetch(`${API_BASE}/get-by-formId/${formId}`);
                if (!res.ok) throw new Error('Not found');
                const msg = await res.json();

                const initials = msg.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                const modal = document.getElementById('viewMessageModal');
                const details = document.getElementById('messageDetails');

                details.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex items-start gap-3 pb-3 border-b">
                            <div class="avatar w-12 h-12 text-lg">${initials}</div>
                            <div class="flex-1">
                                <h4 class="font-semibold" style="color: #133F53;">${escapeHtml(msg.name)}</h4>
                                <p class="text-sm" style="color: #957A54;">${escapeHtml(msg.email)}</p>
                                <p class="text-sm mt-0.5" style="color: #957A54;"><i class="fa-solid fa-phone text-xs mr-1"></i>${escapeHtml(msg.phone || '—')}</p>
                            </div>
                        </div>
                        <div>
                            <h5 class="font-medium mb-2 text-sm" style="color: #133F53;">Message :- </h5>
                            <div class="bg-[#F8F8EA] p-4 rounded-lg message-content border border-[#D89F34]">
                                <p class="text-sm whitespace-pre-line" style="color: #133F53;">${escapeHtml(msg.message)}</p>
                            </div>
                        </div>
                        <div class="flex justify-end gap-2 pt-3 border-t">
                            <button onclick="openDeleteModal(${msg.formId}); closeViewMessageModal();"
                                class="px-4 py-2 bg-red-600 text-white rounded-lg text-sm flex items-center gap-2">
                                <i class="fa-regular fa-trash-can"></i> Delete
                            </button>
                            <button onclick="closeViewMessageModal()" class="px-4 py-2 border border-gray-200 rounded-lg text-sm">Close</button>
                        </div>
                    </div>
                `;

                modal.classList.remove('hidden');
                modal.classList.add('flex');
            } catch (err) {
                showNotification('Error loading message details', 'error');
            }
        }

        function closeViewMessageModal() {
            document.getElementById('viewMessageModal').classList.add('hidden');
            document.getElementById('viewMessageModal').classList.remove('flex');
        }

        // ==================== DELETE ====================
        function openDeleteModal(formId) {
            deleteId = formId;
            document.getElementById('deleteModal').classList.remove('hidden');
            document.getElementById('deleteModal').classList.add('flex');
        }

        function closeDeleteModal() {
            deleteId = null;
            document.getElementById('deleteModal').classList.add('hidden');
            document.getElementById('deleteModal').classList.remove('flex');
        }

        async function confirmDelete() {
            if (!deleteId) return;
            try {
                const res = await fetch(`${API_BASE}/delete-by-formId/${deleteId}`, { method: 'DELETE' });
                if (!res.ok) throw new Error('Delete failed');
                showNotification('Message deleted successfully', 'success');
                closeDeleteModal();
                closeViewMessageModal();
                await loadData(currentPage);
            } catch (err) {
                showNotification('Error deleting message', 'error');
                closeDeleteModal();
            }
        }

        // ==================== EXPORT ====================
        function exportContacts() {
            const headers = ['Name', 'Email', 'Phone', 'Message'];
            const csvRows = [headers.join(',')];

            allContacts.forEach(msg => {
                const row = [
                    `"${msg.name}"`,
                    msg.email,
                    msg.phone || '',
                    `"${msg.message.replace(/"/g, '""')}"`
                ];
                csvRows.push(row.join(','));
            });

            const csv = csvRows.join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `contacts_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            window.URL.revokeObjectURL(url);
            showNotification('Contacts exported successfully', 'success');
        }

        // ==================== HELPERS ====================
        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function showNotification(message, type = 'info') {
            const notification = document.getElementById('notification');
            const icon = document.getElementById('notificationIcon');
            const messageEl = document.getElementById('notificationMessage');

            const colors = {
                success: { bg: '#10B981', icon: 'fa-regular fa-circle-check' },
                error: { bg: '#EF4444', icon: 'fa-solid fa-circle-exclamation' },
                info: { bg: '#3B82F6', icon: 'fa-solid fa-circle-info' }
            };

            notification.style.backgroundColor = colors[type]?.bg || colors.info.bg;
            notification.style.color = 'white';
            icon.className = colors[type]?.icon || colors.info.icon;
            messageEl.textContent = message;
            notification.classList.remove('hidden');

            setTimeout(() => notification.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
