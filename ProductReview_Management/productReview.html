    <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png">

    <title>Dashboard</title>

<style>
   /* Barcode Loader CSS */
.barcode-loader {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    height: 80px;
    gap: 4px;
}

.bar {
    width: 8px;
    background: linear-gradient(180deg, #133F53 0%, #D89F34 70%, #957A54 100%);
    border-radius: 4px 4px 0 0;
    animation: scan-wave 1.2s ease-in-out infinite;
    transform-origin: bottom;
}

@keyframes scan-wave {
    0%, 100% {
        transform: scaleY(1);
        opacity: 0.8;
        background: linear-gradient(180deg, #133F53 0%, #D89F34 70%, #957A54 100%);
    }
    50% {
        transform: scaleY(1.4);
        opacity: 1;
        background: linear-gradient(180deg, #D89F34 0%, #133F53 70%, #957A54 100%);
    }
}
</style>
<body class="bg-[#F2F2E8]">


    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar will be loaded here -->
        <div id="sidebar-container"></div>

        <!-- Main Content Area -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Header will be loaded here -->
            <div id="header-container"></div>

            <!-- Main Content -->
            <main class="flex-1 overflow-y-auto p-6">
              <div>
                <h1 class="text-2xl font-semibold" style="color: #133F53;">Product Review Management</h1>
                <p class="text-sm" style="color: #957A54;">Manage registered customers product reviews.</p>
            </div>
     
            </main>
        </div>
    </div>
<!-- Modals will be loaded here dynamically -->
    <div id="modals-container"></div>
    

    
</body>
</html>
