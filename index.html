<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon_io/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png">
  <title>Admin Login · Artezo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #F8F8EA;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: #F8F8EA;
      border-radius: 1rem;
      box-shadow:
        0 25px 45px -12px rgba(19, 63, 83, 0.3),
        inset 0 1px 3px rgba(255,255,255,0.9);
      overflow: hidden;
      border: 1px solid rgba(229, 161, 35, 0.849);
      animation: cardEnter 0.6s ease-out;
    }

    @keyframes cardEnter {
      0%   { opacity: 0; transform: scale(0.96) translateY(15px); }
      100% { opacity: 1; transform: scale(1)    translateY(0);     }
    }

    .form-panel {
      background: #F8F8EA;
      padding: 2.8rem 2.2rem 2.5rem;
      color: #957A54;
      position: relative;
      isolation: isolate;
    }

    .form-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 100% 0%, rgba(216,159,52,0.2) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    h2 {
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.3rem;
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    h2 span {
      background: #D89F34;
      font-size: 1rem;
      padding: 0.2rem 1.2rem;
      border-radius: 40px;
      color: #133F53;
      font-weight: 600;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .gold-line {
      height: 4px;
      width: 80px;
      background: #D89F34;
      border-radius: 4px;
      margin: 0.6rem 0 2rem 0;
      transition: width 0.3s ease;
    }

    .form-panel:hover .gold-line { width: 130px; }

    .form-container {
      min-height: 240px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    @keyframes formSwap {
      0%   { opacity: 0.2; transform: translateX(6px); }
      100% { opacity: 1;   transform: translateX(0);   }
    }

    .fade-swap { animation: formSwap 0.4s ease; }

    .input-group { margin-bottom: 1.5rem; }

    .input-group input {
      width: 100%;
      background: rgba(248, 248, 234, 0.15);
      border: 1.5px solid #307a9c;
      border-radius: 10px;
      padding: 1rem 1.5rem;
      font-size: 1rem;
      color: #957A54;
      outline: none;
      transition: all 0.25s;
    }

    .input-group input:focus {
      border-color: #D89F34;
      background: rgba(216, 159, 52, 0.1);
      box-shadow: 0 0 0 4px rgba(216, 159, 52, 0.25);
    }

    .input-group input::placeholder { color: #133F53; font-weight: 300; }

    .input-group input:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn {
      background: #D89F34;
      border: none;
      border-radius: 10px;
      padding: 1rem 1.8rem;
      font-size: 1.2rem;
      font-weight: 600;
      color: #133F53;
      width: 100%;
      cursor: pointer;
      transition: 0.15s ease;
      box-shadow: 0 6px 0 #8b621f, 0 8px 18px rgba(0,0,0,0.2);
      letter-spacing: 0.3px;
      margin-top: 0.8rem;
      position: relative;
    }

    .btn:hover:not(:disabled) {
      background: #e0ae47;
      transform: translateY(-2px);
      box-shadow: 0 8px 0 #8b621f, 0 12px 24px rgba(0,0,0,0.2);
    }

    .btn:active:not(:disabled) {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #8b621f, 0 5px 12px rgba(0,0,0,0.15);
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .btn .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(19,63,83,0.3);
      border-top-color: #133F53;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    .btn.loading .btn-text { display: none; }
    .btn.loading .spinner  { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      color: #c0392b;
      font-size: 0.88rem;
      margin-top: 1rem;
      text-align: center;
      min-height: 1.2rem;
      font-weight: 500;
      display: none;
    }

    .error-msg.visible { display: block; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.active { display: flex; }

    .modal-content {
      background: #F8F8EA;
      border-radius: 1.5rem;
      padding: 2rem;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.3);
      animation: modalSlideIn 0.3s ease;
    }

    @keyframes modalSlideIn {
      0%   { opacity: 0; transform: translateY(-20px); }
      100% { opacity: 1; transform: translateY(0);     }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .modal-header h3 { color: #133F53; font-size: 1.5rem; font-weight: 600; }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #957A54;
      transition: color 0.2s;
    }

    .modal-close:hover { color: #133F53; }

    .modal-body {
      color: #133F53;
      font-size: 1.1rem;
      line-height: 1.5;
      margin-bottom: 2rem;
      text-align: center;
    }

    .modal-footer { display: flex; justify-content: center; }

    .modal-btn {
      background: #D89F34;
      color: #133F53;
      border: none;
      border-radius: 60px;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.15s ease;
      box-shadow: 0 4px 0 #8b621f;
    }

    .modal-btn:hover {
      background: #e0ae47;
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #8b621f;
    }

    @media (max-width: 500px) {
      .form-panel { padding: 2rem 1.5rem; }
      h2 { font-size: 1.9rem; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="form-panel">
      <h2>Welcome<span>back</span></h2>
      <div class="gold-line"></div>

      <div class="form-container fade-swap">
        <form id="loginForm">

          <div class="input-group">
            <input
              type="tel"
              id="mobile"
              name="mobile"
              placeholder="mobile number"
              maxlength="10"
              pattern="[0-9]{10}"
              required
            />
          </div>

          <div class="input-group">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="password"
              required
            />
          </div>

          <div class="error-msg" id="errorMsg"></div>

          <button type="submit" class="btn" id="loginBtn">
            <span class="btn-text">sign in</span>
            <span class="spinner"></span>
          </button>

        </form>
      </div>

    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="messageModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Message</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body" id="modalMessage">Your message here</div>
      <div class="modal-footer">
        <button class="modal-btn" id="modalOk">OK</button>
      </div>
    </div>
  </div>

  <!--
    IMPORTANT: components.js is intentionally NOT loaded here.
    components.js calls Auth.requireLogin() on DOMContentLoaded which:
      1. calls isAuthenticated() → hits /api/admin/get-admin-by-adminId/...
      2. gets 401 (not logged in yet)
      3. redirects to /index.html
      4. page reloads → repeat forever → infinite blinking loop

    The login page only needs auth.js for Auth.login() and Auth.redirectIfLoggedIn().
  -->
  <script src="/js/auth.js"></script>

  <script>
    // Redirect to dashboard if session cookie is already valid
    // (e.g. user navigates back to login after already logging in)
    document.addEventListener('DOMContentLoaded', () => {
      Auth.redirectIfLoggedIn();
    });

    const loginForm     = document.getElementById('loginForm');
    const mobileInput   = document.getElementById('mobile');
    const passwordInput = document.getElementById('password');
    const loginBtn      = document.getElementById('loginBtn');
    const errorMsg      = document.getElementById('errorMsg');

    const modal      = document.getElementById('messageModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalMsg   = document.getElementById('modalMessage');
    const modalClose = document.getElementById('modalClose');
    const modalOk    = document.getElementById('modalOk');

    function showModal(title, message) {
      modalTitle.textContent = title;
      modalMsg.textContent   = message;
      modal.classList.add('active');
    }

    function hideModal() { modal.classList.remove('active'); }

    modalClose.addEventListener('click', hideModal);
    modalOk.addEventListener('click', hideModal);
    modal.addEventListener('click', e => { if (e.target === modal) hideModal(); });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    }

    function clearError() {
      errorMsg.textContent = '';
      errorMsg.classList.remove('visible');
    }

    function setLoading(loading) {
      loginBtn.classList.toggle('loading', loading);
      loginBtn.disabled       = loading;
      mobileInput.disabled    = loading;
      passwordInput.disabled  = loading;
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const mobile   = mobileInput.value.trim();
      const password = passwordInput.value;

      if (mobile.length !== 10 || !/^\d{10}$/.test(mobile)) {
        showError('Enter a valid 10-digit mobile number');
        return;
      }

      if (password.length < 6) {
        showError('Password must be at least 6 characters');
        return;
      }

      setLoading(true);

      const result = await Auth.login(mobile, password);

      setLoading(false);

      if (result.success) {
        showModal('Welcome!', 'Login successful. Redirecting to dashboard...');
        setTimeout(() => {
          window.location.href = '/dashboard.html';
        }, 1200);
      } else {
        showError(result.message);
      }
    });

    // Allow digits only in mobile field
    mobileInput.addEventListener('input', () => {
      mobileInput.value = mobileInput.value.replace(/\D/g, '');
    });
  </script>

</body>
</html>
