<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<style>
    .barcode-loader {
        display: flex;
        align-items: flex-end;
        justify-content: center;
        height: 80px;
        gap: 4px;
    }
    .bar {
        width: 8px;
        background: linear-gradient(180deg, #133F53 0%, #D89F34 70%, #957A54 100%);
        border-radius: 4px 4px 0 0;
        animation: scan-wave 1.2s ease-in-out infinite;
        transform-origin: bottom;
    }
    @keyframes scan-wave {
        0%, 100% { transform: scaleY(1); opacity: 0.8; background: linear-gradient(180deg, #133F53 0%, #D89F34 70%, #957A54 100%); }
        50%       { transform: scaleY(1.4); opacity: 1; background: linear-gradient(180deg, #D89F34 0%, #133F53 70%, #957A54 100%); }
    }

    /* Skeleton shimmer */
    .skeleton {
        background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
        background-size: 200% 100%;
        animation: shimmer 1.4s infinite;
        border-radius: 6px;
    }
    @keyframes shimmer {
        0%   { background-position: 200% 0; }
        100% { background-position: -200% 0; }
    }

    /* Sales trend bars */
    .trend-bar {
        flex: 1;
        border-radius: 4px 4px 0 0;
        min-height: 4px;
        transition: height 0.4s ease;
        cursor: pointer;
        position: relative;
    }
    .trend-bar:hover::after {
        content: attr(data-tip);
        position: absolute;
        bottom: calc(100% + 4px);
        left: 50%;
        transform: translateX(-50%);
        background: #133F53;
        color: white;
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 4px;
        white-space: nowrap;
        pointer-events: none;
    }

    /* Order frequency bars */
    .freq-bar {
        flex: 1;
        border-radius: 4px 4px 0 0;
        min-height: 4px;
        transition: height 0.4s ease;
    }
</style>
<body class="bg-[#F2F2E8]">

<div class="flex h-screen overflow-hidden">
    <div id="sidebar-container"></div>

    <div class="flex-1 flex flex-col overflow-hidden">
        <div id="header-container"></div>

        <main class="flex-1 overflow-y-auto p-6">
            <div class="space-y-8">
                <!-- ── STATS CARDS ── -->
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">

                    <!-- Today Sales -->
                    <div class="bg-white p-5 rounded-xl shadow-sm border-l-4 border border-[#D89F34]" style="border-left-color: #133F53;">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-sm text-gray-600">Today Sales</p>
                                <p id="stat-today-sales" class="text-2xl font-bold mt-1 skeleton h-8 w-28" style="color: #133F53;"></p>
                            </div>
                            <div class="border border-blue-400" style="width:36px;height:36px;border-radius:12px;background:#EBF5FB;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                                <svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <!-- wallet body -->
                                    <rect x="2" y="7" width="22" height="15" rx="3" fill="#1A73E8"/>
                                    <!-- wallet flap -->
                                    <rect x="2" y="7" width="22" height="5" rx="2" fill="#1558B0"/>
                                    <!-- card strip -->
                                    <rect x="2" y="10" width="22" height="2" fill="#1A73E8"/>
                                    <!-- coin pocket -->
                                    <rect x="15" y="13" width="7" height="6" rx="2" fill="#4A90D9"/>
                                    <!-- coin circle -->
                                    <circle cx="18.5" cy="16" r="2" fill="#FCC934"/>
                                    <!-- rupee lines -->
                                    <line x1="5" y1="15" x2="11" y2="15" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
                                    <line x1="5" y1="18" x2="11" y2="18" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
                                </svg>
                            </div>
                        </div>
                    </div>

                    <!-- Today Orders -->
                    <div class="bg-white p-5 rounded-xl shadow-sm border-l-4 border border-[#D89F34]" style="border-left-color: #D89F34;">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-sm text-gray-600">Today Orders</p>
                                <p id="stat-today-orders" class="text-2xl font-bold mt-1 skeleton h-8 w-16" style="color: #133F53;"></p>
                            </div>
                            <div class="border border-amber-400" style="width:36px;height:36px;border-radius:12px;background:#FEF6E8;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                                <svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <!-- box bottom -->
                                    <rect x="3" y="12" width="20" height="11" rx="2.5" fill="#F9A825"/>
                                    <!-- box top left flap -->
                                    <path d="M3 12 L3 8 Q3 6 5 6 L13 6 L13 12 Z" fill="#F57F17"/>
                                    <!-- box top right flap -->
                                    <path d="M23 12 L23 8 Q23 6 21 6 L13 6 L13 12 Z" fill="#FFB300"/>
                                    <!-- tape vertical -->
                                    <rect x="11.5" y="6" width="3" height="17" rx="0.5" fill="#FDD835" opacity="0.85"/>
                                    <!-- tape knot top -->
                                    <rect x="11.5" y="6" width="3" height="2.5" rx="0.5" fill="#F9A825"/>
                                    <!-- shine line on box -->
                                    <line x1="6" y1="15" x2="10" y2="15" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
                                </svg>
                            </div>
                        </div>
                    </div>

                    <!-- Total Orders -->
                    <div class="bg-white p-5 rounded-xl shadow-sm border-l-4 border border-[#D89F34]" style="border-left-color: #957A54;">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-sm text-gray-600">Total Orders</p>
                                <p id="stat-total-orders" class="text-2xl font-bold mt-1 skeleton h-8 w-16" style="color: #133F53;"></p>
                            </div>
                            <div class="border border-green-400" style="width:36px;height:36px;border-radius:12px;background:#F0FBF4;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                                <svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <!-- receipt body -->
                                    <rect x="4" y="2" width="15" height="22" rx="2" fill="#34A853"/>
                                    <!-- zigzag bottom -->
                                    <path d="M4 21 L5.5 23 L7 21 L8.5 23 L10 21 L11.5 23 L13 21 L14.5 23 L16 21 L17.5 23 L19 21" stroke="#34A853" stroke-width="2.5" fill="none"/>
                                    <!-- lines on receipt -->
                                    <line x1="7" y1="7"  x2="16" y2="7"  stroke="white" stroke-width="1.3" stroke-linecap="round"/>
                                    <line x1="7" y1="10" x2="16" y2="10" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
                                    <line x1="7" y1="13" x2="13" y2="13" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
                                    <!-- tick badge -->
                                    <circle cx="20" cy="20" r="5" fill="#0F9D58"/>
                                    <polyline points="17.5,20 19.2,21.8 22.5,18" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                                </svg>
                            </div>
                        </div>
                    </div>

                    <!-- Total Revenue -->
                    <div class="bg-white p-5 rounded-xl shadow-sm border-l-4 border border-[#D89F34]" style="border-left-color: #133F53;">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-sm text-gray-600">Total Revenue</p>
                                <p id="stat-total-revenue" class="text-2xl font-bold mt-1 skeleton h-8 w-28" style="color: #133F53;"></p>
                            </div>
                            <div class="border border-red-400" style="width:36px;height:36px;border-radius:12px;background:#FCE8E8;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                                <svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <!-- bar 1 short -->
                                    <rect x="3"  y="17" width="5" height="7" rx="1.5" fill="#EA4335"/>
                                    <!-- bar 2 mid -->
                                    <rect x="10" y="12" width="5" height="12" rx="1.5" fill="#E57368"/>
                                    <!-- bar 3 tall -->
                                    <rect x="17" y="6"  width="5" height="18" rx="1.5" fill="#EA4335"/>
                                    <!-- upward trend arrow line -->
                                    <polyline points="4,18 12,13 19,7" stroke="#B71C1C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                                    <!-- arrowhead -->
                                    <polyline points="16,6 19,7 18,10" stroke="#B71C1C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                                </svg>
                            </div>
                        </div>
                    </div>

                </div>

                <!-- ── SALES TREND + CATEGORY SALES ── -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

                    <!-- Sales Trend -->
                    <div class="bg-white p-5 rounded-xl shadow-sm border border-[#D89F34]">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-semibold" style="color: #133F53;">Sales Trends</h3>
                            <span class="text-xs border px-3 py-1 rounded-full bg-[#F8F8EA] border border-[#D89F34] text-[#957A54]">Last 30 Days</span>
                        </div>
                        <div id="sales-trend-chart" class="h-48 flex items-end justify-between gap-1">
                            <!-- bars injected by JS -->
                            <div class="w-full skeleton h-full rounded"></div>
                        </div>
                        <div id="sales-trend-labels" class="flex justify-between mt-2 text-xs text-gray-500"></div>
                    </div>

                    <!-- Category Sales -->
                    <div class="bg-white p-5 rounded-xl shadow-sm border border-[#D89F34]">
                        <h3 class="font-semibold mb-4" style="color: #133F53;">Most Purchased by Categories</h3>
                        <div id="category-sales-list" class="space-y-3">
                            <!-- skeleton rows -->
                            <div class="skeleton h-4 w-full rounded"></div>
                            <div class="skeleton h-4 w-3/4 rounded"></div>
                            <div class="skeleton h-4 w-1/2 rounded"></div>
                            <div class="skeleton h-4 w-1/3 rounded"></div>
                        </div>
                    </div>
                </div>

                <!-- ── TOP SELLING PRODUCTS + ORDER FREQUENCY ── -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

                    <!-- Top Selling Products (replaces User Demographics) -->
                    <div class="bg-white p-5 rounded-xl shadow-sm  border border-[#D89F34]">
                        <h3 class="font-semibold mb-4" style="color: #133F53;">Top Selling Products</h3>
                        <div id="top-products-list" class="space-y-3">
                            <div class="skeleton h-10 w-full rounded"></div>
                            <div class="skeleton h-10 w-full rounded"></div>
                            <div class="skeleton h-10 w-full rounded"></div>
                            <div class="skeleton h-10 w-3/4 rounded"></div>
                        </div>
                    </div>

                    <!-- Order Frequency -->
                    <div class="bg-white p-5 rounded-xl shadow-sm border border-[#D89F34]">
                        <h3 class="font-semibold mb-4" style="color: #133F53;">Order Frequency</h3>
                        <div id="order-freq-chart" class="h-32 flex items-end justify-between gap-2">
                            <div class="w-full skeleton h-full rounded"></div>
                        </div>
                        <div id="order-freq-labels" class="flex justify-between mt-2 text-xs text-gray-500"></div>
                    </div>
                </div>

                <!-- ── RECENT ORDERS ── -->
                <div class="bg-white p-5 rounded-xl shadow-sm border border border-[#D89F34]">
                    <h3 class="font-semibold mb-4" style="color: #133F53;">Recent Orders</h3>
                    <div class="overflow-auto h-[300px]">
                        <table class="w-full">
                            <thead class="bg-amber-100 sticky top-0">
                                <tr class="border-b border-gray-200">
                                    <th class="text-left py-2">ORDER ID</th>
                                    <th class="text-left">CUSTOMER</th>
                                    <th class="text-left">PRODUCT</th>
                                    <th class="text-left">AMOUNT</th>
                                    <th class="text-left">STATUS</th>
                                </tr>
                            </thead>
                            <tbody id="recent-orders-body">
                                <!-- skeleton rows -->
                                <tr><td colspan="5"><div class="skeleton h-8 w-full my-1 rounded"></div></td></tr>
                                <tr><td colspan="5"><div class="skeleton h-8 w-full my-1 rounded"></div></td></tr>
                                <tr><td colspan="5"><div class="skeleton h-8 w-full my-1 rounded"></div></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>
</div>

<div id="modals-container"></div>

<script src="/js/order-badge.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/components.js"></script>

<script>
    // ── CONFIG ────────────────────────────────────────────────────────────────────
    const BASE_URL = 'http://localhost:8085';

    const BAR_COLORS = ['#D89F34', '#133F53', '#957A54'];
    function barColor(i) { return BAR_COLORS[i % BAR_COLORS.length]; }

    function fmt(n) {
        if (n === null || n === undefined) return '—';
        return Number(n).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    // function removeSkeleton(el) {
    //     el.classList.remove('skeleton', 'h-8', 'h-10', 'h-full', 'w-28', 'w-16', 'w-full', 'rounded');
    // }

    // REPLACE with:
    function removeSkeleton(el) {
        el.classList.remove('skeleton');
        el.style.height = '';
        el.style.width  = '';
    }

    // ── STATUS BADGE ──────────────────────────────────────────────────────────────
    function statusBadge(status) {
        const map = {
            PLACED:    'bg-[#D89F34] text-[#133F53]',
            SHIPPED:   'bg-[#133F53] text-white',
            DELIVERED: 'bg-green-600 text-white',
            CANCELLED: 'bg-red-100 text-red-700',
            PENDING:   'bg-gray-200 text-gray-700',
        };
        const cls = map[status] || 'bg-gray-200 text-gray-700';
        return `<span class="${cls} px-2 py-1 rounded text-xs">${status}</span>`;
    }

    // ── STATS ─────────────────────────────────────────────────────────────────────
    async function loadStats() {
        try {
            const res  = await fetch(`${BASE_URL}/api/dashboard/stats`);
            const data = await res.json();

            const ts = document.getElementById('stat-today-sales');
            removeSkeleton(ts);
            ts.textContent = '₹' + fmt(data.todaySales);

            const to = document.getElementById('stat-today-orders');
            removeSkeleton(to);
            to.textContent = data.todayOrders ?? '—';

            const tto = document.getElementById('stat-total-orders');
            removeSkeleton(tto);
            tto.textContent = data.totalOrders ?? '—';

            const tr = document.getElementById('stat-total-revenue');
            removeSkeleton(tr);
            tr.textContent = '₹' + fmt(data.totalRevenue);

        } catch (e) {
            console.error('Stats load failed', e);
        }
    }

    // ── SALES TREND ───────────────────────────────────────────────────────────────
    async function loadSalesTrend() {
        try {
            const res  = await fetch(`${BASE_URL}/api/dashboard/sales-trend`);
            const data = await res.json();

            const chart  = document.getElementById('sales-trend-chart');
            const labDiv = document.getElementById('sales-trend-labels');
            chart.innerHTML  = '';
            labDiv.innerHTML = '';

            if (!data.values || data.values.length === 0) {
                chart.innerHTML = '<p class="text-xs text-gray-400 m-auto">No data yet</p>';
                return;
            }

            const max    = Math.max(...data.values, 1);
            const CHART_H = 192; // h-48 = 12rem = 192px

            // Show at most 30 bars; thin them out if more
            const step  = Math.ceil(data.values.length / 30);
            const vals  = data.values.filter((_, i) => i % step === 0);
            const labs  = data.labels.filter((_, i) => i % step === 0);

            vals.forEach((v, i) => {
                const bar = document.createElement('div');
                bar.className   = 'trend-bar';
                bar.style.height      = Math.max((v / max) * CHART_H, 4) + 'px';
                bar.style.background  = barColor(i);
                bar.setAttribute('data-tip', '₹' + fmt(v));
                chart.appendChild(bar);
            });

            // Show ~7 evenly spaced labels
            const labelStep = Math.max(1, Math.floor(labs.length / 7));
            labs.forEach((l, i) => {
                const span = document.createElement('span');
                // format "2025-03-14" → "Mar 14"
                try {
                    const d = new Date(l);
                    span.textContent = d.toLocaleDateString('en-IN', { month: 'short', day: 'numeric' });
                } catch { span.textContent = l; }
                span.style.visibility = (i % labelStep === 0) ? 'visible' : 'hidden';
                labDiv.appendChild(span);
            });

        } catch (e) {
            console.error('Sales trend load failed', e);
        }
    }

    // ── CATEGORY SALES ────────────────────────────────────────────────────────────
    async function loadCategorySales() {
        try {
            const res  = await fetch(`${BASE_URL}/api/dashboard/category-sales`);
            const data = await res.json();

            const container = document.getElementById('category-sales-list');
            container.innerHTML = '';

            if (!data.length) {
                container.innerHTML = '<p class="text-xs text-gray-400">No data yet</p>';
                return;
            }

            const colors = ['#133F53', '#D89F34', '#957A54', '#133F53', '#D89F34', '#957A54'];

            data.forEach((item, i) => {
                const div = document.createElement('div');
                div.innerHTML = `
                    <div class="flex justify-between text-sm mb-1">
                        <span>${item.category || 'Unknown'}</span>
                        <span class="text-gray-400 text-xs">${item.orderCount} orders</span>
                    </div>
                    <div class="w-full bg-gray-200 h-2 rounded-full">
                        <div class="h-2 rounded-full transition-all duration-700"
                            style="width: ${item.percentage}%; background: ${colors[i % colors.length]}">
                        </div>
                    </div>`;
                container.appendChild(div);
            });

        } catch (e) {
            console.error('Category sales load failed', e);
        }
    }

    // ── TOP SELLING PRODUCTS ──────────────────────────────────────────────────────
    async function loadTopProducts() {
        try {
            const res  = await fetch(`${BASE_URL}/api/dashboard/top-products`);
            const data = await res.json();

            const container = document.getElementById('top-products-list');
            container.innerHTML = '';

            if (!data.length) {
                container.innerHTML = '<p class="text-xs text-gray-400">No sales data yet</p>';
                return;
            }

            const maxSold = Math.max(...data.map(p => p.totalSold), 1);
            const colors  = ['#133F53', '#D89F34', '#957A54', '#133F53', '#D89F34'];

            data.forEach((p, i) => {
                const pct = Math.round((p.totalSold / maxSold) * 100);
                const div = document.createElement('div');
                div.innerHTML = `
                    <div class="flex justify-between items-center text-sm mb-1">
                        <span class="font-medium truncate max-w-[60%]" title="${p.productName}">${p.productName}</span>
                        <span class="text-xs text-gray-500">${p.totalSold} sold &nbsp;·&nbsp; ₹${fmt(p.revenue)}</span>
                    </div>
                    <div class="w-full bg-gray-200 h-2 rounded-full">
                        <div class="h-2 rounded-full transition-all duration-700"
                            style="width: ${pct}%; background: ${colors[i % colors.length]}">
                        </div>
                    </div>`;
                container.appendChild(div);
            });

        } catch (e) {
            console.error('Top products load failed', e);
        }
    }

    // ── ORDER FREQUENCY ───────────────────────────────────────────────────────────
    async function loadOrderFrequency() {
        try {
            const res  = await fetch(`${BASE_URL}/api/dashboard/order-frequency`);
            const data = await res.json();

            const chart  = document.getElementById('order-freq-chart');
            const labDiv = document.getElementById('order-freq-labels');
            chart.innerHTML  = '';
            labDiv.innerHTML = '';

            const max    = Math.max(...data.values, 1);
            const CHART_H = 128; // h-32

            data.values.forEach((v, i) => {
                const bar = document.createElement('div');
                bar.className  = 'freq-bar';
                bar.style.height     = Math.max((v / max) * CHART_H, 4) + 'px';
                bar.style.background = barColor(i);
                chart.appendChild(bar);
            });

            data.labels.forEach(l => {
                const span = document.createElement('span');
                span.textContent = l;
                labDiv.appendChild(span);
            });

        } catch (e) {
            console.error('Order frequency load failed', e);
        }
    }

    // ── RECENT ORDERS ─────────────────────────────────────────────────────────────
    async function loadRecentOrders() {
        try {
            const res  = await fetch(`${BASE_URL}/api/dashboard/recent-orders`);
            const data = await res.json();

            const tbody = document.getElementById('recent-orders-body');
            tbody.innerHTML = '';

            if (!data.length) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center py-6 text-gray-400 text-sm">No orders yet</td></tr>`;
                return;
            }

            data.forEach(order => {
                const tr = document.createElement('tr');
                tr.className = 'border-b border-gray-100';
                tr.innerHTML = `
                    <td class="py-2 font-mono text-xs">${order.orderStrId || '—'}</td>
                    <td>${order.customerName || '—'}</td>
                    <td class="max-w-[160px] truncate" title="${order.productName || ''}">${order.productName || '—'}</td>
                    <td>₹${fmt(order.finalAmount)}</td>
                    <td>${statusBadge(order.orderStatus)}</td>`;
                tbody.appendChild(tr);
            });

        } catch (e) {
            console.error('Recent orders load failed', e);
        }
    }

    // ── INIT ──────────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
        loadStats();
        loadSalesTrend();
        loadCategorySales();
        loadTopProducts();
        loadOrderFrequency();
        loadRecentOrders();
    });
</script>


</body>
</html>
